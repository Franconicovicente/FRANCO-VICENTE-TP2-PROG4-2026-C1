<article class="post-card">

  <header class="post-header">
    <div class="post-author">
      <div class="avatar-circle">
        @if (post().autor.fotoUrl) {
          <img [src]="post().autor.fotoUrl" [alt]="nombreCompleto()" />
        } @else {
          <span>{{ post().autor.nombre.charAt(0) }}</span>
        }
      </div>
      <div class="author-info">
        <span class="author-name">{{ nombreCompleto() }}</span>
        <span class="post-date">{{ fechaFormateada() }}</span>
      </div>
    </div>

    @if (esMiPost()) {
      <button type="button" class="delete-btn" (click)="onDeleteClick()" aria-label="Eliminar publicación">
        🗑️
      </button>
    }
  </header>

  <h3 class="post-title">{{ post().titulo }}</h3>
  <p class="post-content">{{ post().descripcion }}</p>

  @if (post().imagenUrl) {
    <div class="post-image-wrapper">
      <img [src]="post().imagenUrl" [alt]="'Imagen de la publicación: ' + post().titulo" class="post-image" />
    </div>
  }

  <footer class="post-actions">
    <button type="button" class="action-btn" [class.liked]="post().likedByMe" (click)="onLikeClick()">
      <span>{{ post().likedByMe ? '❤️' : '🤍' }}</span>
      <span>{{ post().likesCount }}</span>
    </button>
  </footer>

</article>
