<div class="app-shell">

  <!-- Navbar superior -->
  <header class="topbar">
    <span class="brand-name">Nobu</span>
    <div class="topbar-right">
      <app-theme-toggle />
      <button type="button" class="icon-btn" aria-label="Notificaciones">🔔</button>
      <div class="topbar-avatar">
        @if (authService.currentUser()?.avatarUrl) {
          <img [src]="authService.currentUser()?.avatarUrl" alt="Avatar" />
        } @else {
          <span>{{ (authService.currentUser()?.username ?? '?').charAt(0) }}</span>
        }
      </div>
    </div>
  </header>

  <div class="app-body">

    <!-- Sidebar lateral -->
    <aside class="sidebar">
      <div class="sidebar-brand">
        <span class="sidebar-title">Nobu</span>
        <span class="sidebar-subtitle">Tu red social</span>
      </div>

      <nav class="sidebar-nav">
        <a routerLink="/feed" routerLinkActive="active" class="nav-link">
          <span class="nav-icon">📰</span>
          <span>Feed</span>
        </a>
        <a routerLink="/profile" routerLinkActive="active" class="nav-link">
          <span class="nav-icon">👤</span>
          <span>Perfil</span>
        </a>
      </nav>

      <button type="button" class="new-post-btn" routerLink="/feed">
        New Post
      </button>

      <button type="button" class="logout-btn" (click)="onLogout()">
        Cerrar sesión
      </button>
    </aside>

    <!-- Contenido de la pantalla activa (Feed o Profile) -->
    <main class="content">
      <router-outlet />
    </main>

  </div>

</div>
